<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.T.O.R.M. Studio — Statut & Suivi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-void: #0a0e14;
    --bg-panel: #10151d;
    --bg-raised: #161d28;
    --line: #232c3a;
    --line-bright: #33425a;
    --text: #dbe4f0;
    --text-dim: #7d8ba0;
    --accent: #2dd4bf;
    --warn: #f5a524;
    --danger: #f5546c;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-void);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--bg-panel);
    border: 1px solid var(--line-bright);
    border-radius: 4px;
    padding: 22px 24px;
    position: relative;
  }
  .card::before, .card::after {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    border: 2px solid var(--accent);
    pointer-events: none;
  }
  .card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* --- Widget statut serveur --- */
  .status-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.5);
  }
  .status-dot.online {
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--danger); }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.5); }
    70% { box-shadow: 0 0 0 8px rgba(45, 212, 191, 0); }
    100% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0); }
  }

  .status-hostname {
    font-size: 16px;
    font-weight: 600;
  }

  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .status-box {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 12px;
  }
  .status-box .label {
    font-size: 10.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }
  .status-box .value {
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--accent);
  }

  /* --- Widget suivi de commande --- */
  .order-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .order-input-row input {
    flex: 1;
    background: var(--bg-void);
    border: 1px solid var(--line-bright);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
  }
  .order-input-row input:focus { border-color: var(--accent); }
  .order-input-row input::placeholder { color: var(--text-dim); }

  .order-input-row button {
    background: var(--bg-raised);
    border: 1px solid var(--line-bright);
    color: var(--text);
    padding: 0 18px;
    border-radius: 3px;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .order-input-row button:hover { border-color: var(--accent); color: var(--accent); }

  .order-result {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line-bright);
    border-radius: 3px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    min-height: 20px;
  }
  .order-result.en_attente { border-left-color: var(--danger); }
  .order-result.en_cours { border-left-color: var(--warn); }
  .order-result.livree { border-left-color: var(--accent); }

  .order-result .numero {
    font-family: var(--font-mono);
    color: var(--text);
    font-weight: 600;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="card">
    <h2>🛰️ Statut du serveur</h2>
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-hostname" id="statusHostname">Connexion...</div>
    </div>
    <div class="status-grid">
      <div class="status-box">
        <div class="label">Joueurs</div>
        <div class="value" id="statusPlayers">—</div>
      </div>
      <div class="status-box">
        <div class="label">État</div>
        <div class="value" id="statusState">—</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📦 Suivi de commande</h2>
    <div class="order-input-row">
      <input type="text" id="orderInput" placeholder="CMD-1234" maxlength="10">
      <button onclick="checkOrder()">Vérifier</button>
    </div>
    <div class="order-result" id="orderResult">Entre ton numéro de commande ci-dessus.</div>
  </div>

  <div class="footer-note">S.T.O.R.M. Studio</div>

</div>

<script>
  // ⚠️ Remplace par l'URL de ton bot Render
  const BOT_API_URL = 'https://fivem-bot-li92.onrender.com';

  async function loadStatus() {
    const dot = document.getElementById('statusDot');
    const hostname = document.getElementById('statusHostname');
    const players = document.getElementById('statusPlayers');
    const state = document.getElementById('statusState');

    try {
      const res = await fetch(`${BOT_API_URL}/api/status`);
      const data = await res.json();

      if (data.online) {
        dot.className = 'status-dot online';
        hostname.textContent = data.hostname || 'Serveur FiveM';
        players.textContent = `${data.players} / ${data.maxPlayers}`;
        state.textContent = 'En ligne';
      } else {
        dot.className = 'status-dot offline';
        hostname.textContent = 'Serveur fermé';
        players.textContent = '—';
        state.textContent = 'Hors ligne';
      }
    } catch (err) {
      dot.className = 'status-dot offline';
      hostname.textContent = 'Erreur de connexion';
    }
  }

  async function checkOrder() {
    const input = document.getElementById('orderInput');
    const result = document.getElementById('orderResult');
    const numero = input.value.trim().toUpperCase();

    if (!numero) {
      result.className = 'order-result';
      result.textContent = 'Entre un numéro de commande.';
      return;
    }

    result.className = 'order-result';
    result.textContent = 'Recherche en cours...';

    try {
      const res = await fetch(`${BOT_API_URL}/api/order?numero=${encodeURIComponent(numero)}`);
      const data = await res.json();

      if (!data.ok) {
        result.className = 'order-result';
        result.textContent = `Aucune commande trouvée pour "${numero}".`;
        return;
      }

      result.className = `order-result ${data.statut}`;
      result.innerHTML = `Commande <span class="numero">${data.numero}</span> — ${data.statutLabel}`;
    } catch (err) {
      result.className = 'order-result';
      result.textContent = 'Erreur de connexion au serveur.';
    }
  }

  document.getElementById('orderInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkOrder();
  });

  loadStatus();
  setInterval(loadStatus, 30000); // rafraîchit toutes les 30 secondes
</script>

</body>
</html>
